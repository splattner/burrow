name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Runs on every push to main that is NOT a release. Builds and pushes a
  # development image tagged `edge` (latest unreleased) and `sha-<short>`.
  # latest is intentionally reserved for GoReleaser on tagged releases.
  snapshot:
    name: Snapshot image (edge)
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/burrow"
          echo "IMAGE_NAME=${image}" >> "$GITHUB_ENV"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=edge
            type=sha,format=short,prefix=sha-

      - name: Build and push snapshot image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan snapshot image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate Trivy SARIF
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

  # Runs only when release-please creates a release. GoReleaser owns the full
  # release pipeline: changelog, cross-compiled binaries, versioned container
  # images (including `latest`), SBOM attachment, and cosign signing.
  goreleaser:
    name: GoReleaser
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Set image name
        id: image
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/burrow"
          echo "IMAGE_NAME=${image}" >> "$GITHUB_ENV"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ steps.image.outputs.image }}

      - name: Scan release image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image }}:${{ needs.release-please.outputs.tag_name }}
          format: table
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate release image SARIF
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image }}:${{ needs.release-please.outputs.tag_name }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif


