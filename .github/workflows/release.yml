name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  image:
    name: Container image
    runs-on: ubuntu-latest
    needs: release-please
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/burrow"
          echo "IMAGE_NAME=${image}" >> "$GITHUB_ENV"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-
            type=raw,value=${{ needs.release-please.outputs.tag_name }},enable=${{ needs.release-please.outputs.release_created == 'true' }}
            type=raw,value=${{ needs.release-please.outputs.version }},enable=${{ needs.release-please.outputs.release_created == 'true' }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate Trivy SARIF
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      - name: Generate CycloneDX SBOM
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx
          output: burrow.sbom.cdx.json
          scanners: vuln

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: burrow-sbom
          path: burrow.sbom.cdx.json
          if-no-files-found: error

      - name: Attach SBOM to GitHub release
        if: ${{ always() && needs.release-please.outputs.release_created == 'true' }}
        run: gh release upload "${TAG_NAME}" burrow.sbom.cdx.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
