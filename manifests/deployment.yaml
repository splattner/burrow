apiVersion: apps/v1
kind: Deployment
metadata:
  name: krt-server
  namespace: default
  labels:
    app: krt-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krt-server
  template:
    metadata:
      labels:
        app: krt-server
    spec:
      serviceAccountName: krt-server
      containers:
        - name: server
          image: ghcr.io/example/k8s-reverse-tunnel:latest
          imagePullPolicy: IfNotPresent
          args: ["server"]
          env:
            - name: KRT_JWT_ALG
              value: "HS256"
            - name: KRT_JWT_HMAC_SECRET
              value: "change-me"
            - name: KRT_JWT_AUDIENCE
              value: "krt-server"
            - name: KRT_JWT_ISSUER
              value: "dev-local"
            - name: KRT_SERVER_ADDR
              value: ":8080"
            - name: KRT_BRIDGE_ADDR
              value: ":1111"
            - name: KRT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KRT_LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8080
            - name: bridge
              containerPort: 1111
