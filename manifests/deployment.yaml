apiVersion: apps/v1
kind: Deployment
metadata:
  name: burrow-server
  namespace: default
  labels:
    app: burrow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: burrow-server
  template:
    metadata:
      labels:
        app: burrow-server
    spec:
      serviceAccountName: burrow-server
      containers:
        - name: server
          image: ghcr.io/example/burrow:latest
          imagePullPolicy: IfNotPresent
          args: ["server"]
          env:
            - name: BURROW_JWT_ALG
              value: "HS256"
            - name: BURROW_JWT_HMAC_SECRET
              value: "change-me"
            - name: BURROW_JWT_AUDIENCE
              value: "burrow-server"
            - name: BURROW_JWT_ISSUER
              value: "dev-local"
            - name: BURROW_SERVER_ADDR
              value: ":8080"
            - name: BURROW_BRIDGE_ADDR
              value: ":1111"
            - name: BURROW_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BURROW_LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8080
            - name: bridge
              containerPort: 1111
