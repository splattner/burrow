apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: krt-server
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: krt.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: krt-server
                port:
                  number: 80
